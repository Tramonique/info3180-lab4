{% extends 'base.html' %}

{% block main %}
<h1 class="page-header">Uploaded Images</h1>

{% include 'flash_messages.html' %}

<div class="image-grid">
    {% for image in images %}
        <div class="image-card">
            <img src="{{ url_for('get_image', filename=image) }}" alt="Uploaded Image">
            <p>{{ image }}</p>
        </div>
    {% endfor %}
</div>
{% endblock %}
